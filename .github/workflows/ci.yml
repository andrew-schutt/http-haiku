name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — RSpec (+ Bullet N+1 checks)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: http_haiku_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/http_haiku_test
      SECRET_KEY_BASE: ci_secret_key_base_not_used_in_tests

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: backend/.ruby-version
          bundler-cache: true
          working-directory: backend

      - name: Set up database
        working-directory: backend
        run: bin/rails db:schema:load

      - name: Run RSpec
        working-directory: backend
        run: bundle exec rspec

  backend-security:
    name: Backend — Security (Brakeman + bundler-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: backend/.ruby-version
          bundler-cache: true
          working-directory: backend

      - name: Brakeman static analysis
        working-directory: backend
        run: bundle exec brakeman -q -z

      - name: bundler-audit vulnerability scan
        working-directory: backend
        run: |
          bundle exec bundler-audit update
          bundle exec bundler-audit check

  frontend-tests:
    name: Frontend — Vitest + type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check + build
        working-directory: frontend
        run: npm run build

      - name: Run tests
        working-directory: frontend
        run: npm run test

  frontend-security:
    name: Frontend — npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Vulnerability scan
        working-directory: frontend
        run: npm audit --audit-level=high
